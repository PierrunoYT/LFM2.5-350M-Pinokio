<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LFM2.5-350M — WebGPU Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #2a2a2a;
      text-align: center;
    }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    #status {
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: #888;
    }
    #progress-bar-container {
      margin-top: 0.5rem;
      height: 6px;
      background: #1a1a1a;
      border-radius: 3px;
      overflow: hidden;
      display: none;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: #4f9cf7;
      transition: width 0.2s;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .message {
      max-width: 80%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 0.95rem;
    }
    .message.user {
      align-self: flex-end;
      background: #2563eb;
      color: #fff;
    }
    .message.assistant {
      align-self: flex-start;
      background: #1e1e1e;
      color: #ddd;
    }
    #input-area {
      padding: 0.75rem 1.5rem;
      border-top: 1px solid #2a2a2a;
      display: flex;
      gap: 0.5rem;
    }
    #input-area textarea {
      flex: 1;
      resize: none;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 0.95rem;
      font-family: inherit;
      rows: 1;
      height: 42px;
    }
    #input-area textarea:focus { outline: none; border-color: #4f9cf7; }
    #input-area button {
      padding: 0.6rem 1rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
    }
    #send-btn {
      background: #2563eb;
      color: #fff;
    }
    #send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    #clear-btn {
      background: #2a2a2a;
      color: #ccc;
    }
    #clear-btn:hover { background: #333; }
  </style>
</head>
<body>
  <header>
    <h1>LFM2.5-350M — WebGPU Chat</h1>
    <div id="status">Initializing…</div>
    <div id="progress-bar-container"><div id="progress-bar"></div></div>
  </header>

  <div id="chat"></div>

  <div id="input-area">
    <textarea id="user-input" placeholder="Type a message…" disabled></textarea>
    <button id="send-btn" disabled>Send</button>
    <button id="clear-btn">Clear</button>
  </div>

  <script type="module">
    const worker = new Worker("worker.js", { type: "module" });

    const chatEl = document.getElementById("chat");
    const inputEl = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");
    const clearBtn = document.getElementById("clear-btn");
    const statusEl = document.getElementById("status");
    const progressContainer = document.getElementById("progress-bar-container");
    const progressBar = document.getElementById("progress-bar");

    let messages = [
      { role: "system", content: "You are a helpful assistant." }
    ];
    let generating = false;
    let generationId = 0;
    let currentAssistantEl = null;
    let currentAssistantText = "";

    // Ask worker to load the model
    statusEl.textContent = "Loading model…";
    progressContainer.style.display = "block";
    worker.postMessage({ type: "load" });

    worker.addEventListener("message", (e) => {
      const data = e.data;

      if (data.type === "progress") {
        const pct = data.progress != null ? Math.round(data.progress) : 0;
        statusEl.textContent = `Loading model… ${pct}%`;
        progressBar.style.width = pct + "%";
      } else if (data.type === "ready") {
        statusEl.textContent = "Ready";
        progressContainer.style.display = "none";
        inputEl.disabled = false;
        sendBtn.disabled = false;
        inputEl.focus();
      } else if (data.type === "token") {
        if (data.generationId !== generationId) return;
        currentAssistantText += data.token;
        if (currentAssistantEl) {
          currentAssistantEl.textContent = currentAssistantText;
          chatEl.scrollTop = chatEl.scrollHeight;
        }
      } else if (data.type === "done") {
        if (data.generationId !== generationId) return;
        const finalText = data.output || currentAssistantText;
        if (currentAssistantEl) {
          currentAssistantEl.textContent = finalText;
        }
        messages.push({ role: "assistant", content: finalText });
        currentAssistantEl = null;
        currentAssistantText = "";
        generating = false;
        inputEl.disabled = false;
        sendBtn.disabled = false;
        inputEl.focus();
      } else if (data.type === "error") {
        statusEl.textContent = "Error: " + data.message;
        generating = false;
        inputEl.disabled = false;
        sendBtn.disabled = false;
      }
    });

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || generating) return;

      // Show user bubble
      appendBubble(text, "user");
      messages.push({ role: "user", content: text });
      inputEl.value = "";

      // Prepare assistant bubble
      currentAssistantText = "";
      currentAssistantEl = appendBubble("", "assistant");

      generating = true;
      generationId++;
      inputEl.disabled = true;
      sendBtn.disabled = true;

      worker.postMessage({ type: "generate", messages: [...messages], generationId });
    }

    function appendBubble(text, role) {
      const div = document.createElement("div");
      div.className = "message " + role;
      div.textContent = text;
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
      return div;
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    clearBtn.addEventListener("click", () => {
      if (generating) return;
      messages = [{ role: "system", content: "You are a helpful assistant." }];
      chatEl.innerHTML = "";
      generationId++;
      currentAssistantEl = null;
      currentAssistantText = "";
    });
  </script>
</body>
</html>
